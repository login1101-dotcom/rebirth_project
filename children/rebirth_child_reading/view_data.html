                <div style="display: grid; grid-template-columns: 1fr; gap: 2rem;">
                    <!-- WPM Chart Container -->
                    <div style="background: #fff; padding: 1rem; border-radius: 8px; border: 1px solid #e2e8f0;">
                        <canvas id="wpmChart" height="250"></canvas>
                    </div>

                    <!-- Accuracy Chart Container -->
                    <div style="background: #fff; padding: 1rem; border-radius: 8px; border: 1px solid #e2e8f0;">

        <!-- Load Chart.js -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        
        <script>
            // Data Configured via Python Script
            
            // Chart 1: Books Finished
            const ctx1 = document.getElementById('wpmChart').getContext('2d');
            new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['Start', 'Now', 'Goal'],
                    datasets: [{
            label: 'Books Count',
            data: [0, 1, 10],
            borderColor: '#4338ca',
            backgroundColor: 'rgba(67, 56, 202, 0.1)',
            fill: true,
            stepped: true
        }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: { display: true, text: 'Books Finished' }
                    },
                    scales: {
                        y: { beginAtZero: true, display: true, position: 'left' },
                        // Add y1 for potential dual axis usage (Health, YouTube)
                        y1: { beginAtZero: true, display: false, position: 'right', grid: { drawOnChartArea: false } }
                    }
                }
            });

            // Chart 2: Current Book Progress (Page)
            const ctx2 = document.getElementById('accuracyChart').getContext('2d');
            new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'],
                    datasets: [{
             label: 'Page Number',
             data: [0, 20, 45, 80, 100],
             borderColor: '#a5b4fc',
             fill: true
        }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: { display: true, text: 'Current Book Progress (Page)' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
            
            // Activate Dual Axis if needed (Health, YouTube)
            // Validating logic: check if datasets have yAxisID
            if (JSON.stringify([{
            label: 'Books Count',
            data: [0, 1, 10],
            borderColor: '#4338ca',
            backgroundColor: 'rgba(67, 56, 202, 0.1)',
            fill: true,
            stepped: true
        }]).includes('y1')) {
                Chart.getChart("wpmChart").options.scales.y1.display = true;
                Chart.getChart("wpmChart").update();
            }
        </script>
